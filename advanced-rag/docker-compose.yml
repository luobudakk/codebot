services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  neo4j:
    image: neo4j:5.26.0-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      # Prefer setting NEO4J_AUTH in .env for local privacy.
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/advanced-rag-dev-change-me}
      NEO4J_PLUGINS: '["apoc"]'

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
