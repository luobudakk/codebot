name: codebot-ci

on:
  push:
    paths:
      - "codebot/**"
  pull_request:
    paths:
      - "codebot/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codebot/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test
